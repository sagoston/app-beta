name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-run-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run app and capture stdout
        run: ./build/app_beta > actual_output.txt

      - name: Diff against expected output
        run: diff tests/expected_output.txt actual_output.txt
